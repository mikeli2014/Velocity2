# Nginx config for serving the Velocity OS Vite bundle.
# Listens on 8080 (Cloud Run / Cloud Build convention).

server {
  listen 8080;
  listen [::]:8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compress text assets on the fly. Vite already produces hashed
  # filenames so we cache them aggressively below.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/javascript application/json
             image/svg+xml font/woff2;

  # Long cache for fingerprinted Vite output (JS / CSS / images / fonts).
  location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|svg|webp|woff2?|ttf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # Never cache the entry HTML so deploys roll out immediately.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback: any unmatched path returns index.html so the React
  # router can take over client-side. Static files still resolve normally.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Lightweight liveness endpoint for Cloud Run / Cloud Build health checks.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }
}
